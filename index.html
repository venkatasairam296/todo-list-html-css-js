<!DOCTYPE html>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
  <header>
    <h1 class="head-name">TODO</h1>

    <nav>
      <ul>
        <li><a id="all-btn" href="#">Home</a></li>
        <li><a id="completed-btn" href="#">Completed</a></li>
        <li><a id="incompleted-btn" href="#">Incompleted</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <div class="inputs">
      <div class="todo-inputs">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search List">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
  
        <div class="theme-btns">
          <button class="dark-mode">
            <i class="fa-regular fa-moon"></i>
          </button>
  
          <button class="light-mode">
            <i class="fa-regular fa-sun"></i>
          </button>
        </div>
      </div>

      <div class="task-stats">
        <p>Total: <span id="total-cnt">0</span></p>
        <p>Completed: <span id="completed-cnt">0</span></p>
        <p>Pending: <span id="pending-cnt">0</span></p>
      </div>
    </div>

    <ul class="todo" id="todo-list">

      <button class="new-task-btn" id="new-task-btn">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>

  </main>
  <section id="new-task-page" class="new-task-page hidden">
    <div class="new-page-content">
      <h2>New Task Page</h2>

      <div class="task-input">
        <input type="text" id="task-ipt" placeholder="Write your new Task">
      </div>
      
      <div class="new-page-btns">
        <button id="cancel-btn" class="cancel-btn">Cancel</button>
